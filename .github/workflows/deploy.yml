name: Deploy Backend to K8s Cluster

on:
  push:
    branches:
      - k8s

env:
  REGISTRY: 100.81.167.109:30500
  K8S_REGISTRY: 148.213.8.22:30500
  IMAGE_NAME: wardapp-backend
  K8S_NAMESPACE: ward
  DEPLOYMENT_NAME: wardapp-backend
  CONTAINER_NAME: api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código fuente de la rama k8s
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configurar Node.js y activar la caché de dependencias de npm para acelerar el build
      - name: Setup Node.js with Cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Conectarse a la red VPN de Tailscale
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      # 4. Configurar Docker local para permitir el registro HTTP inseguro (demonio moby)
      - name: Configure Insecure Registry
        run: |
          sudo bash -c 'echo "{\"insecure-registries\": [\"100.81.167.109:30500\"]}" > /etc/docker/daemon.json'
          sudo systemctl restart docker

      # 5. Iniciar sesión en el registro privado a través de la VPN
      - name: Login to Local Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} \
            -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      # 6. Compilar y subir la imagen de forma nativa
      - name: Build and Push Docker Image
        run: |
          echo "Building production image..."
          docker build -f Dockerfile.prod \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          
          echo "Pushing image tag ${{ github.sha }}..."
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          echo "Pushing image tag latest..."
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 7. Configurar kubeconfig para interactuar con el clúster
      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      # 8. Ejecutar migraciones de Prisma directamente sobre el pod activo (antes del despliegue)
      - name: Run Prisma Database Migrations
        run: |
          echo "Running migrations in active backend pod..."
          kubectl exec -n ${{ env.K8S_NAMESPACE }} deployment/${{ env.DEPLOYMENT_NAME }} -- npx prisma migrate deploy

      # 9. Actualizar la imagen en el Deployment de Kubernetes (usando la IP de red física)
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.K8S_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}
          
          # Verificar que el rollout termine exitosamente
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }}
